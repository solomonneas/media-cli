<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="CRT television showing SMPTE color bars">
  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="screenGlare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- antenna -->
  <g stroke="#666" stroke-width="3" stroke-linecap="round" fill="#666">
    <line x1="160" y1="20" x2="140" y2="70"/>
    <line x1="200" y1="20" x2="220" y2="70"/>
    <circle cx="140" cy="18" r="4"/>
    <circle cx="220" cy="18" r="4"/>
  </g>

  <!-- case -->
  <rect x="30" y="60" width="340" height="220" rx="16" fill="url(#case)"/>

  <!-- screen bezel -->
  <rect x="50" y="80" width="260" height="180" rx="10" fill="#0f0f0f"/>

  <!-- SMPTE color bars (upper 130px of screen area) -->
  <g>
    <rect x="60" y="90" width="34" height="130" fill="#c0c0c0"/>
    <rect x="94" y="90" width="34" height="130" fill="#c0c000"/>
    <rect x="128" y="90" width="34" height="130" fill="#00c0c0"/>
    <rect x="162" y="90" width="34" height="130" fill="#00c000"/>
    <rect x="196" y="90" width="34" height="130" fill="#c000c0"/>
    <rect x="230" y="90" width="34" height="130" fill="#c00000"/>
    <rect x="264" y="90" width="36" height="130" fill="#0000c0"/>
  </g>

  <!-- lower black band + subtle reverse bars (PLUGE stripe) -->
  <rect x="60" y="220" width="240" height="30" fill="#0a0a12"/>
  <rect x="60" y="236" width="80" height="14" fill="#00008a"/>
  <rect x="220" y="236" width="80" height="14" fill="#0a0a12"/>

  <!-- screen glare -->
  <rect x="60" y="90" width="240" height="160" rx="6" fill="url(#screenGlare)"/>

  <!-- speaker grille / dials on the right -->
  <rect x="328" y="100" width="28" height="100" rx="3" fill="#262626"/>
  <g fill="#0d0d0d">
    <circle cx="342" cy="118" r="4"/>
    <circle cx="342" cy="140" r="4"/>
    <circle cx="342" cy="162" r="4"/>
    <circle cx="342" cy="184" r="4"/>
  </g>
  <circle cx="342" cy="222" r="8" fill="#555" stroke="#111" stroke-width="2"/>
  <circle cx="342" cy="250" r="8" fill="#555" stroke="#111" stroke-width="2"/>

  <!-- feet -->
  <rect x="100" y="280" width="40" height="12" rx="3" fill="#1a1a1a"/>
  <rect x="260" y="280" width="40" height="12" rx="3" fill="#1a1a1a"/>
</svg>
